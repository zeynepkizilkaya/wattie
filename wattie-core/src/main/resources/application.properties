spring.application.name=wattie-core

spring.datasource.url=jdbc:postgresql://localhost:5433/wattie
spring.datasource.username=wattie
spring.datasource.password=wattie
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.i2i.wattie.*
spring.kafka.consumer.group-id=wattie-core
spring.kafka.consumer.properties.spring.json.value.default.type=com.i2i.wattie.telemetry.dto.TelemetryMessage
spring.kafka.consumer.properties.spring.json.use.type.headers=false

# Gemini AI API Configuration
gemini.api.key=${GEMINI_API_KEY:}

# Ollama Local LLM Configuration
ollama.url=${OLLAMA_URL:http://localhost:11434/api/generate}
ollama.model=${OLLAMA_MODEL:llama3.2}

# Gmail SMTP Configuration
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=durakzeynepsila@gmail.com
spring.mail.password=${GMAIL_APP_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

# VoltWise Admin Authentication
wattie.admin.email=${VOLTWISE_ADMIN_EMAIL:admin@wattie.com}
wattie.admin.password=${VOLTWISE_ADMIN_PASSWORD:wattie123}
